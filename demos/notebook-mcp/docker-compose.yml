services:
  jupyter:
    image: jupyter/scipy-notebook:latest
    container_name: jupyter-mcp
    ports:
      - "8888:8888"
    volumes:
      - jupyter-workspace:/home/jovyan/work
    command: >
      start-notebook.py
      --IdentityProvider.token=''
      --ServerApp.allow_origin='*'
    restart: unless-stopped

volumes:
  jupyter-workspace:
